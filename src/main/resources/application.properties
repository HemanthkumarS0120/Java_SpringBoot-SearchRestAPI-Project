spring.application.name=search-rest-api
spring.datasource.url=jdbc:mysql://localhost:3306/search_api
spring.datasource.username=root
spring.datasource.password=SQL__7am

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

#Actuator endpoints enable
management.endpoints.web.exposure.include=*

#enables Spring Boot Actuator to expose environment information in the /actuator/info endpoint.
management.info.env.enabled=true

#Info Actuator endpoint
info.app.name =Spring Boot Restful Search API services
info.app.description=Spring Boot Restful Search API Services Demo
info.app.version =1.0.0

#Health Actuator endpoint
management.endpoint.health.show-details=ALWAYS


#Enable the shutdown endpoint of actuator
management.endpoint.shutdown.enabled=true

